name: Render & deploy slides

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; do not cancel in-progress runs so an
# already-deployed presentation stays live until a new one finishes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Manim's MathTex shells out to system `latex` + `dvisvgm`. We don't
      # use conda-forge's texlive-core because that package is a stub that
      # crashes mktexfmt on first run (missing TeXLive::* perl modules).
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-extra texlive-fonts-recommended \
            texlive-science cm-super dvisvgm

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          # If pixi.lock is committed, this enforces a reproducible install.
          # If absent (first run on a fresh fork), pixi resolves from scratch.
          frozen: false
          cache: true

      - name: Render slides and build site
        run: pixi run build-site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
